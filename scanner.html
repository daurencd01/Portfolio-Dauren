<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Free passive web security scanner — check your site's security headers, TLS, cookies and CORS. By Koshkenbek Dauren.">

    <!-- Security Headers -->
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; object-src 'none';">
    <meta name="referrer" content="strict-origin-when-cross-origin">

    <title>Web Security Scanner | KD_SEC</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@400;500;700;900&family=Space+Grotesk:wght@300;400;600&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/scanner.css">

    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <meta name="theme-color" content="#050505">
</head>

<body style="background: var(--bg-dark); color: var(--text-main); margin: 0; min-height: 100vh;">

    <a href="index.html" class="scan-back">← Back to portfolio</a>

    <main class="scan-wrap">
        <div class="scan-head">
            <h1>WEB SECURITY SCANNER</h1>
            <p>Бесплатная пассивная проверка безопасности сайта: заголовки, TLS, cookie, CORS и
               открытые файлы. Только обычные запросы — никаких атак.</p>
            <div class="tool-switch">
                <a href="scanner.html" class="active">🛡️ Scanner</a>
                <a href="osint.html">🔎 OSINT</a>
                <a href="exposure.html">🔥 Exposure</a>
            </div>
        </div>

        <form class="scan-form" id="scanForm" autocomplete="off">
            <input type="text" id="scanUrl" placeholder="example.com" aria-label="URL для проверки" required>
            <button type="submit" id="scanBtn">SCAN</button>
        </form>
        <div class="scan-hint">Проверяйте свои сайты или те, на которые у вас есть разрешение.</div>

        <div class="scan-status" id="scanStatus"></div>
        <div class="scan-results" id="scanResults"></div>
    </main>

    <script src="js/scanner.js"></script>
</body>

</html>
